openapi: 3.1.0
info:
  title: Bramble Health API
  description: |
    The Bramble Health API provides HIPAA-compliant access to EHR integrations,
    care coordination workflows, patient data, and clinical operations. Built on
    HL7 FHIR R4 conventions, the API powers care teams at health systems across the US.

    **Base URL:** `https://api.bramblehealth.com/v1`

    **FHIR Compatibility:** R4 (4.0.1)

    All requests must be made over HTTPS. Requests made over HTTP will be rejected.
  version: "1.0.0"
  contact:
    name: Bramble Health Developer Support
    email: developers@bramblehealth.com
    url: https://docs.bramblehealth.com
  license:
    name: Proprietary
    url: https://bramblehealth.com/terms

servers:
  - url: https://api.bramblehealth.com/v1
    description: Production
  - url: https://sandbox.bramblehealth.com/v1
    description: Sandbox (non-PHI, safe for testing)

security:
  - BearerAuth: []

tags:
  - name: Patients
    description: Create, read, update, and search patient demographics
  - name: Practitioners
    description: Provider directory and credentials
  - name: Appointments
    description: Schedule, update, and cancel appointments
  - name: Observations
    description: Clinical measurements, vitals, and lab results
  - name: Medications
    description: Medication requests, statements, and dispensing
  - name: Care Plans
    description: Longitudinal care plans and goal tracking
  - name: EHR Connections
    description: Manage connections to external EHR systems
  - name: Webhooks
    description: Subscribe to real-time event notifications
  - name: Organizations
    description: Health system and facility management

paths:
  # ── Patients ─────────────────────────────────────────────────────────────────

  /patients:
    get:
      tags: [Patients]
      operationId: listPatients
      summary: Search patients
      description: |
        Returns a paginated list of patients matching the given search criteria.
        Supports HL7 FHIR R4 search parameters. All results are scoped to your
        organization's authorized patient population.

        > **HIPAA Notice:** This endpoint returns PHI. Ensure your integration
        > logs all access per your audit requirements.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: family
          in: query
          description: Patient's family (last) name
          schema:
            type: string
          example: "Smith"
        - name: given
          in: query
          description: Patient's given (first) name
          schema:
            type: string
          example: "Jane"
        - name: birthdate
          in: query
          description: "Date of birth in YYYY-MM-DD format"
          schema:
            type: string
            format: date
          example: "1985-04-23"
        - name: identifier
          in: query
          description: "MRN or other patient identifier. Format: `system|value`"
          schema:
            type: string
          example: "http://hospital.example/mrn|MRN-00123"
        - name: _sort
          in: query
          description: Sort field(s). Prefix with `-` for descending.
          schema:
            type: string
            enum: [family, birthdate, -family, -birthdate]
          example: "-birthdate"
      responses:
        "200":
          description: Paginated list of patients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientBundle'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Patients]
      operationId: createPatient
      summary: Create a patient
      description: |
        Creates a new patient record. Returns the created patient with a
        server-assigned `id`. Duplicate detection uses `identifier` values;
        if a match is found a `409 Conflict` is returned with the existing
        patient's ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientCreate'
            example:
              resourceType: Patient
              identifier:
                - system: "http://hospital.example/mrn"
                  value: "MRN-00456"
              name:
                - use: official
                  family: Johnson
                  given: [Emily, Rose]
              gender: female
              birthDate: "1990-07-14"
              telecom:
                - system: phone
                  value: "720-555-0192"
                  use: mobile
              address:
                - line: ["1234 Maple St"]
                  city: Denver
                  state: CO
                  postalCode: "80203"
                  country: US
      responses:
        "201":
          description: Patient created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        "400":
          $ref: '#/components/responses/BadRequest'
        "409":
          $ref: '#/components/responses/Conflict'

  /patients/{patientId}:
    get:
      tags: [Patients]
      operationId: getPatient
      summary: Get a patient
      description: Returns a single patient by their Bramble-assigned ID.
      parameters:
        - $ref: '#/components/parameters/PatientId'
      responses:
        "200":
          description: Patient record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        "404":
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Patients]
      operationId: updatePatient
      summary: Update a patient
      description: |
        Replaces the patient record. Supply the full resource; fields
        omitted from the request body are cleared. To make partial updates,
        use `PATCH` with JSON Patch operations.
      parameters:
        - $ref: '#/components/parameters/PatientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientCreate'
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        "404":
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Patients]
      operationId: deletePatient
      summary: Delete a patient
      description: |
        Soft-deletes the patient record. The record is retained for audit
        purposes but excluded from search results. Hard deletion requires
        a support request per your BAA.
      parameters:
        - $ref: '#/components/parameters/PatientId'
      responses:
        "204":
          description: Patient deleted
        "404":
          $ref: '#/components/responses/NotFound'

  # ── Practitioners ─────────────────────────────────────────────────────────────

  /practitioners:
    get:
      tags: [Practitioners]
      operationId: listPractitioners
      summary: Search practitioners
      description: |
        Returns practitioners (physicians, nurses, care managers, etc.) in your
        organization's provider directory.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: name
          in: query
          description: Full or partial practitioner name
          schema:
            type: string
        - name: specialty
          in: query
          description: "SNOMED specialty code, e.g. `394814009` (General practice)"
          schema:
            type: string
        - name: npi
          in: query
          description: National Provider Identifier
          schema:
            type: string
            pattern: '^\d{10}$'
      responses:
        "200":
          description: Paginated list of practitioners
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PractitionerBundle'
        "401":
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Practitioners]
      operationId: createPractitioner
      summary: Create a practitioner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PractitionerCreate'
      responses:
        "201":
          description: Practitioner created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Practitioner'

  /practitioners/{practitionerId}:
    get:
      tags: [Practitioners]
      operationId: getPractitioner
      summary: Get a practitioner
      parameters:
        - $ref: '#/components/parameters/PractitionerId'
      responses:
        "200":
          description: Practitioner record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Practitioner'
        "404":
          $ref: '#/components/responses/NotFound'

  # ── Appointments ─────────────────────────────────────────────────────────────

  /appointments:
    get:
      tags: [Appointments]
      operationId: listAppointments
      summary: Search appointments
      description: Returns appointments matching the given filters.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: patient
          in: query
          description: Filter by patient ID
          schema:
            type: string
        - name: practitioner
          in: query
          description: Filter by practitioner ID
          schema:
            type: string
        - name: date
          in: query
          description: |
            Filter by date using FHIR date modifiers.
            Examples: `2024-06-01`, `ge2024-06-01`, `le2024-06-30`
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [proposed, pending, booked, arrived, fulfilled, cancelled, noshow]
      responses:
        "200":
          description: Appointment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentBundle'

    post:
      tags: [Appointments]
      operationId: createAppointment
      summary: Book an appointment
      description: |
        Books a new appointment. The slot must be marked available; attempting
        to book an occupied slot returns `409 Conflict`. Send a `Appointment-
        Notification` header with value `patient` to trigger an automated
        patient reminder.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreate'
            example:
              resourceType: Appointment
              status: booked
              serviceType:
                - coding:
                    - system: "http://snomed.info/sct"
                      code: "185349003"
                      display: Annual physical exam
              start: "2024-09-10T09:00:00-06:00"
              end: "2024-09-10T09:30:00-06:00"
              participant:
                - actor:
                    reference: "Patient/pt-00456"
                  status: accepted
                - actor:
                    reference: "Practitioner/prac-0012"
                  status: accepted
      responses:
        "201":
          description: Appointment booked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        "409":
          $ref: '#/components/responses/Conflict'

  /appointments/{appointmentId}:
    get:
      tags: [Appointments]
      operationId: getAppointment
      summary: Get an appointment
      parameters:
        - $ref: '#/components/parameters/AppointmentId'
      responses:
        "200":
          description: Appointment record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        "404":
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Appointments]
      operationId: updateAppointmentStatus
      summary: Update appointment status
      description: Update the status of an existing appointment (e.g., cancel or mark fulfilled).
      parameters:
        - $ref: '#/components/parameters/AppointmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [proposed, pending, booked, arrived, fulfilled, cancelled, noshow]
                cancellationReason:
                  type: string
                  description: Required when status is `cancelled`
              required: [status]
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'

  # ── Observations ─────────────────────────────────────────────────────────────

  /observations:
    get:
      tags: [Observations]
      operationId: listObservations
      summary: Search observations
      description: |
        Returns clinical observations: vitals, lab results, and assessments.
        Filter by LOINC code to retrieve specific measurement types.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: patient
          in: query
          required: true
          description: Patient ID (required)
          schema:
            type: string
        - name: code
          in: query
          description: |
            LOINC code for the observation type.
            Common codes: `8867-4` (heart rate), `8310-5` (body temperature),
            `55284-4` (blood pressure), `29463-7` (body weight)
          schema:
            type: string
        - name: date
          in: query
          description: Date range filter. Supports FHIR prefixes `ge`, `le`, `gt`, `lt`.
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
            enum: [vital-signs, laboratory, social-history, imaging, procedure]
      responses:
        "200":
          description: Observation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservationBundle'

    post:
      tags: [Observations]
      operationId: createObservation
      summary: Record an observation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObservationCreate'
            example:
              resourceType: Observation
              status: final
              category:
                - coding:
                    - system: "http://terminology.hl7.org/CodeSystem/observation-category"
                      code: vital-signs
              code:
                coding:
                  - system: "http://loinc.org"
                    code: "8867-4"
                    display: Heart rate
              subject:
                reference: "Patient/pt-00456"
              effectiveDateTime: "2024-09-10T09:05:00-06:00"
              valueQuantity:
                value: 72
                unit: "/min"
                system: "http://unitsofmeasure.org"
                code: "/min"
      responses:
        "201":
          description: Observation recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Observation'

  /observations/{observationId}:
    get:
      tags: [Observations]
      operationId: getObservation
      summary: Get an observation
      parameters:
        - $ref: '#/components/parameters/ObservationId'
      responses:
        "200":
          description: Observation record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Observation'
        "404":
          $ref: '#/components/responses/NotFound'

  # ── Medications ──────────────────────────────────────────────────────────────

  /medication-requests:
    get:
      tags: [Medications]
      operationId: listMedicationRequests
      summary: Search medication requests
      description: Returns active and historical medication requests (prescriptions) for a patient.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: patient
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, on-hold, cancelled, completed, entered-in-error, stopped, draft, unknown]
        - name: intent
          in: query
          schema:
            type: string
            enum: [proposal, plan, order, instance-order, option]
      responses:
        "200":
          description: Medication request list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicationRequestBundle'

    post:
      tags: [Medications]
      operationId: createMedicationRequest
      summary: Create a medication request
      description: |
        Creates a new medication order. Requires the `medication-write` scope.
        Controlled substances require an additional `dea-auth` scope and
        a valid DEA registration number in the practitioner record.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MedicationRequestCreate'
      responses:
        "201":
          description: Medication request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicationRequest'

  # ── Care Plans ───────────────────────────────────────────────────────────────

  /care-plans:
    get:
      tags: [Care Plans]
      operationId: listCarePlans
      summary: Search care plans
      description: Returns longitudinal care plans for a patient or care team.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: patient
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, on-hold, revoked, completed, entered-in-error, unknown]
        - name: category
          in: query
          description: SNOMED care plan category code
          schema:
            type: string
      responses:
        "200":
          description: Care plan list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarePlanBundle'

    post:
      tags: [Care Plans]
      operationId: createCarePlan
      summary: Create a care plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarePlanCreate'
      responses:
        "201":
          description: Care plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarePlan'

  /care-plans/{carePlanId}:
    get:
      tags: [Care Plans]
      operationId: getCarePlan
      summary: Get a care plan
      parameters:
        - $ref: '#/components/parameters/CarePlanId'
      responses:
        "200":
          description: Care plan record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarePlan'
        "404":
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Care Plans]
      operationId: updateCarePlan
      summary: Update a care plan
      parameters:
        - $ref: '#/components/parameters/CarePlanId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarePlanCreate'
      responses:
        "200":
          description: Updated care plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarePlan'

  # ── EHR Connections ───────────────────────────────────────────────────────────

  /ehr-connections:
    get:
      tags: [EHR Connections]
      operationId: listEhrConnections
      summary: List EHR connections
      description: |
        Returns all configured EHR system connections for your organization.
        Bramble supports Epic, Cerner, Athenahealth, eClinicalWorks, and
        any SMART on FHIR-compatible system.
      responses:
        "200":
          description: Connection list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EhrConnection'
                  total:
                    type: integer

    post:
      tags: [EHR Connections]
      operationId: createEhrConnection
      summary: Add an EHR connection
      description: |
        Registers a new EHR system connection. After creation, the connection
        enters a `pending` state while Bramble validates credentials and
        performs a test FHIR handshake. A `ehr_connection.activated` webhook
        fires when the connection is ready.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EhrConnectionCreate'
            example:
              system: epic
              label: "Denver General Epic"
              fhirBaseUrl: "https://fhir.denvergeneral.org/api/FHIR/R4"
              auth:
                type: smart_on_fhir
                clientId: "bramble-app-123"
                clientSecret: "••••••••"
                scope: "launch patient/*.read user/*.write"
      responses:
        "201":
          description: Connection created (pending validation)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EhrConnection'

  /ehr-connections/{connectionId}:
    get:
      tags: [EHR Connections]
      operationId: getEhrConnection
      summary: Get an EHR connection
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: EHR connection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EhrConnection'
        "404":
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [EHR Connections]
      operationId: deleteEhrConnection
      summary: Remove an EHR connection
      description: Deactivates and removes the EHR connection. Pending syncs will be cancelled.
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Connection removed

  # ── Webhooks ─────────────────────────────────────────────────────────────────

  /webhooks:
    get:
      tags: [Webhooks]
      operationId: listWebhooks
      summary: List webhook subscriptions
      responses:
        "200":
          description: Webhook list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Webhook'

    post:
      tags: [Webhooks]
      operationId: createWebhook
      summary: Create a webhook subscription
      description: |
        Subscribes to one or more event types. Bramble will send an HTTP POST
        to your `url` for each matching event. Payloads are signed with HMAC-SHA256;
        validate the `X-Bramble-Signature-256` header before processing.

        **Available event types:**
        - `patient.created`, `patient.updated`, `patient.deleted`
        - `appointment.booked`, `appointment.cancelled`, `appointment.fulfilled`
        - `observation.created`
        - `care_plan.created`, `care_plan.updated`
        - `ehr_connection.activated`, `ehr_connection.error`
        - `medication_request.created`, `medication_request.stopped`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookCreate'
            example:
              url: "https://your-app.example.com/webhooks/bramble"
              events:
                - appointment.booked
                - appointment.cancelled
                - patient.updated
              secret: "your-signing-secret"
              active: true
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'

  /webhooks/{webhookId}:
    delete:
      tags: [Webhooks]
      operationId: deleteWebhook
      summary: Delete a webhook subscription
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Webhook deleted

  /webhooks/{webhookId}/test:
    post:
      tags: [Webhooks]
      operationId: testWebhook
      summary: Send a test event
      description: Delivers a `webhook.test` event to verify your endpoint is reachable and signatures validate correctly.
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test event sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  delivered:
                    type: boolean
                  statusCode:
                    type: integer
                  latencyMs:
                    type: integer

# ── Components ─────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Issue a JWT by calling `POST /auth/token` with your `client_id`
        and `client_secret`. Tokens expire after 1 hour and must be
        refreshed using the `refresh_token`.

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for pagination

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Number of results per page (max 100)

    PatientId:
      name: patientId
      in: path
      required: true
      description: Bramble patient ID (prefix `pt-`)
      schema:
        type: string
      example: "pt-00456"

    PractitionerId:
      name: practitionerId
      in: path
      required: true
      schema:
        type: string
      example: "prac-0012"

    AppointmentId:
      name: appointmentId
      in: path
      required: true
      schema:
        type: string
      example: "appt-8821"

    ObservationId:
      name: observationId
      in: path
      required: true
      schema:
        type: string
      example: "obs-3392"

    CarePlanId:
      name: carePlanId
      in: path
      required: true
      schema:
        type: string
      example: "cp-7741"

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'

    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'
          example:
            resourceType: OperationOutcome
            issue:
              - severity: error
                code: security
                diagnostics: "Bearer token is missing or has expired."

    Forbidden:
      description: Insufficient permissions for this operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'

    Conflict:
      description: Resource already exists or state conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'

  schemas:
    # ── Shared / FHIR primitives ────────────────────────────────────────────────

    OperationOutcome:
      type: object
      description: FHIR OperationOutcome — returned for errors
      properties:
        resourceType:
          type: string
          enum: [OperationOutcome]
        issue:
          type: array
          items:
            type: object
            properties:
              severity:
                type: string
                enum: [fatal, error, warning, information]
              code:
                type: string
              diagnostics:
                type: string
              location:
                type: array
                items:
                  type: string

    Meta:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        resourceType:
          type: string
          readOnly: true
        meta:
          type: object
          properties:
            versionId:
              type: string
            lastUpdated:
              type: string
              format: date-time
            source:
              type: string

    HumanName:
      type: object
      properties:
        use:
          type: string
          enum: [usual, official, temp, nickname, anonymous, old, maiden]
        family:
          type: string
        given:
          type: array
          items:
            type: string
        prefix:
          type: array
          items:
            type: string
        suffix:
          type: array
          items:
            type: string

    ContactPoint:
      type: object
      properties:
        system:
          type: string
          enum: [phone, fax, email, pager, url, sms, other]
        value:
          type: string
        use:
          type: string
          enum: [home, work, temp, old, mobile]

    Address:
      type: object
      properties:
        line:
          type: array
          items:
            type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
          default: US

    Identifier:
      type: object
      properties:
        system:
          type: string
          format: uri
        value:
          type: string

    CodeableConcept:
      type: object
      properties:
        coding:
          type: array
          items:
            type: object
            properties:
              system:
                type: string
                format: uri
              code:
                type: string
              display:
                type: string
        text:
          type: string

    Reference:
      type: object
      properties:
        reference:
          type: string
        display:
          type: string

    # ── Patient ─────────────────────────────────────────────────────────────────

    PatientCreate:
      type: object
      required: [resourceType, name, birthDate]
      properties:
        resourceType:
          type: string
          enum: [Patient]
        identifier:
          type: array
          items:
            $ref: '#/components/schemas/Identifier'
        active:
          type: boolean
          default: true
        name:
          type: array
          items:
            $ref: '#/components/schemas/HumanName'
        telecom:
          type: array
          items:
            $ref: '#/components/schemas/ContactPoint'
        gender:
          type: string
          enum: [male, female, other, unknown]
        birthDate:
          type: string
          format: date
        address:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        communication:
          type: array
          items:
            type: object
            properties:
              language:
                $ref: '#/components/schemas/CodeableConcept'
              preferred:
                type: boolean

    Patient:
      allOf:
        - $ref: '#/components/schemas/Meta'
        - $ref: '#/components/schemas/PatientCreate'

    PatientBundle:
      type: object
      properties:
        resourceType:
          type: string
          enum: [Bundle]
        type:
          type: string
          enum: [searchset]
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        entry:
          type: array
          items:
            type: object
            properties:
              resource:
                $ref: '#/components/schemas/Patient'

    # ── Practitioner ────────────────────────────────────────────────────────────

    PractitionerCreate:
      type: object
      required: [resourceType, name]
      properties:
        resourceType:
          type: string
          enum: [Practitioner]
        identifier:
          type: array
          description: Include NPI as `http://hl7.org/fhir/sid/us-npi|<npi>`
          items:
            $ref: '#/components/schemas/Identifier'
        active:
          type: boolean
          default: true
        name:
          type: array
          items:
            $ref: '#/components/schemas/HumanName'
        telecom:
          type: array
          items:
            $ref: '#/components/schemas/ContactPoint'
        qualification:
          type: array
          items:
            type: object
            properties:
              code:
                $ref: '#/components/schemas/CodeableConcept'
              period:
                type: object
                properties:
                  start:
                    type: string
                    format: date
                  end:
                    type: string
                    format: date

    Practitioner:
      allOf:
        - $ref: '#/components/schemas/Meta'
        - $ref: '#/components/schemas/PractitionerCreate'

    PractitionerBundle:
      type: object
      properties:
        total:
          type: integer
        entry:
          type: array
          items:
            type: object
            properties:
              resource:
                $ref: '#/components/schemas/Practitioner'

    # ── Appointment ─────────────────────────────────────────────────────────────

    AppointmentCreate:
      type: object
      required: [resourceType, status, start, end, participant]
      properties:
        resourceType:
          type: string
          enum: [Appointment]
        status:
          type: string
          enum: [proposed, pending, booked, arrived, fulfilled, cancelled, noshow]
        serviceType:
          type: array
          items:
            $ref: '#/components/schemas/CodeableConcept'
        specialty:
          type: array
          items:
            $ref: '#/components/schemas/CodeableConcept'
        appointmentType:
          $ref: '#/components/schemas/CodeableConcept'
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        comment:
          type: string
        participant:
          type: array
          items:
            type: object
            properties:
              actor:
                $ref: '#/components/schemas/Reference'
              status:
                type: string
                enum: [accepted, declined, tentative, needs-action]

    Appointment:
      allOf:
        - $ref: '#/components/schemas/Meta'
        - $ref: '#/components/schemas/AppointmentCreate'

    AppointmentBundle:
      type: object
      properties:
        total:
          type: integer
        entry:
          type: array
          items:
            type: object
            properties:
              resource:
                $ref: '#/components/schemas/Appointment'

    # ── Observation ─────────────────────────────────────────────────────────────

    ObservationCreate:
      type: object
      required: [resourceType, status, code, subject]
      properties:
        resourceType:
          type: string
          enum: [Observation]
        status:
          type: string
          enum: [registered, preliminary, final, amended, corrected, cancelled, entered-in-error, unknown]
        category:
          type: array
          items:
            $ref: '#/components/schemas/CodeableConcept'
        code:
          $ref: '#/components/schemas/CodeableConcept'
        subject:
          $ref: '#/components/schemas/Reference'
        effectiveDateTime:
          type: string
          format: date-time
        valueQuantity:
          type: object
          properties:
            value:
              type: number
            unit:
              type: string
            system:
              type: string
            code:
              type: string
        valueString:
          type: string
        valueCodeableConcept:
          $ref: '#/components/schemas/CodeableConcept'
        interpretation:
          type: array
          items:
            $ref: '#/components/schemas/CodeableConcept'
        note:
          type: array
          items:
            type: object
            properties:
              text:
                type: string

    Observation:
      allOf:
        - $ref: '#/components/schemas/Meta'
        - $ref: '#/components/schemas/ObservationCreate'

    ObservationBundle:
      type: object
      properties:
        total:
          type: integer
        entry:
          type: array
          items:
            type: object
            properties:
              resource:
                $ref: '#/components/schemas/Observation'

    # ── Medication Request ───────────────────────────────────────────────────────

    MedicationRequestCreate:
      type: object
      required: [resourceType, status, intent, medicationCodeableConcept, subject, requester]
      properties:
        resourceType:
          type: string
          enum: [MedicationRequest]
        status:
          type: string
          enum: [active, on-hold, cancelled, completed, entered-in-error, stopped, draft, unknown]
        intent:
          type: string
          enum: [proposal, plan, order, instance-order, option]
        medicationCodeableConcept:
          $ref: '#/components/schemas/CodeableConcept'
        subject:
          $ref: '#/components/schemas/Reference'
        requester:
          $ref: '#/components/schemas/Reference'
        dosageInstruction:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
              timing:
                type: object
              doseAndRate:
                type: array
                items:
                  type: object
        dispenseRequest:
          type: object
          properties:
            numberOfRepeatsAllowed:
              type: integer
            quantity:
              type: object

    MedicationRequest:
      allOf:
        - $ref: '#/components/schemas/Meta'
        - $ref: '#/components/schemas/MedicationRequestCreate'

    MedicationRequestBundle:
      type: object
      properties:
        total:
          type: integer
        entry:
          type: array
          items:
            type: object
            properties:
              resource:
                $ref: '#/components/schemas/MedicationRequest'

    # ── Care Plan ────────────────────────────────────────────────────────────────

    CarePlanCreate:
      type: object
      required: [resourceType, status, intent, subject]
      properties:
        resourceType:
          type: string
          enum: [CarePlan]
        status:
          type: string
          enum: [draft, active, on-hold, revoked, completed, entered-in-error, unknown]
        intent:
          type: string
          enum: [proposal, plan, order, option]
        category:
          type: array
          items:
            $ref: '#/components/schemas/CodeableConcept'
        title:
          type: string
        description:
          type: string
        subject:
          $ref: '#/components/schemas/Reference'
        period:
          type: object
          properties:
            start:
              type: string
              format: date
            end:
              type: string
              format: date
        careTeam:
          type: array
          items:
            $ref: '#/components/schemas/Reference'
        goal:
          type: array
          items:
            $ref: '#/components/schemas/Reference'
        activity:
          type: array
          items:
            type: object
            properties:
              detail:
                type: object
                properties:
                  code:
                    $ref: '#/components/schemas/CodeableConcept'
                  status:
                    type: string
                  description:
                    type: string

    CarePlan:
      allOf:
        - $ref: '#/components/schemas/Meta'
        - $ref: '#/components/schemas/CarePlanCreate'

    CarePlanBundle:
      type: object
      properties:
        total:
          type: integer
        entry:
          type: array
          items:
            type: object
            properties:
              resource:
                $ref: '#/components/schemas/CarePlan'

    # ── EHR Connection ───────────────────────────────────────────────────────────

    EhrConnectionCreate:
      type: object
      required: [system, fhirBaseUrl, auth]
      properties:
        system:
          type: string
          enum: [epic, cerner, athenahealth, eclinicalworks, allscripts, meditech, custom]
          description: EHR vendor
        label:
          type: string
          description: Human-readable name for this connection
        fhirBaseUrl:
          type: string
          format: uri
          description: FHIR R4 base URL of the EHR
        auth:
          type: object
          properties:
            type:
              type: string
              enum: [smart_on_fhir, basic, api_key, oauth2_client_credentials]
            clientId:
              type: string
            clientSecret:
              type: string
            scope:
              type: string
            tokenUrl:
              type: string
              format: uri

    EhrConnection:
      allOf:
        - type: object
          properties:
            id:
              type: string
              readOnly: true
            status:
              type: string
              enum: [pending, active, error, disabled]
            lastSyncedAt:
              type: string
              format: date-time
              readOnly: true
            errorMessage:
              type: string
              readOnly: true
            createdAt:
              type: string
              format: date-time
              readOnly: true
        - $ref: '#/components/schemas/EhrConnectionCreate'

    # ── Webhook ──────────────────────────────────────────────────────────────────

    WebhookCreate:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
          description: HTTPS endpoint to deliver events to
        events:
          type: array
          items:
            type: string
          description: List of event types to subscribe to
        secret:
          type: string
          description: Used to sign payloads with HMAC-SHA256
        active:
          type: boolean
          default: true

    Webhook:
      allOf:
        - type: object
          properties:
            id:
              type: string
              readOnly: true
            createdAt:
              type: string
              format: date-time
              readOnly: true
            lastDeliveryAt:
              type: string
              format: date-time
              readOnly: true
            deliverySuccessRate:
              type: number
              format: float
              readOnly: true
        - $ref: '#/components/schemas/WebhookCreate'
